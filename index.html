<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDetox 2.5</title>
    
    <!-- Baja recursos de fuentes de Google y ayuda a faster loading (tercer link hyper ref)-->
    <link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700&display=swap)" rel="stylesheet">

    <!-- Tailwind CSS allows extracting specific colors and fonts that we want to use -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bio: {
                            bg: '#050505',
                            card: '#0f1110',
                            neon: '#5EEAD4',
                            green: '#86EFAC',
                            muted: '#A3A3A3'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Aquí se conecta CSS Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="antialiased selection:bg-bio-neon selection:text-black relative">

    <div class="custom-cursor" id="cursor-glow"></div>

    <header class="fixed top-0 w-full z-50 mix-blend-difference px-6 py-6 flex justify-between items-center text-xs font-mono uppercase tracking-widest">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-bio-neon rounded-full animate-pulse"></div>
            <span class="font-bold text-white">RDetoX 2.5</span>
        </div>
        <nav class="hidden md:flex gap-8 text-bio-muted">
            <a href="#impact" class="hover:text-bio-neon transition-colors">Impact</a>
        </nav>
    </header>

    <section class="h-screen flex flex-col items-center justify-center text-center px-4 relative">
        <div class="max-w-4xl reveal active">
            <h1 class="text-7xl md:text-9xl font-display font-bold leading-none tracking-tight mb-6">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-bio-green to-bio-neon">RDetox 2.5</span>
            </h1>
        </div>
    </section>

    <!-- (Aquí iría el resto de tus secciones HTML como Impacto, Biorremediación, etc...) -->

    <!-- Aquí relacionamos el Java Script -->
    <script src="js/app.js"></script>
</body>
</html>
